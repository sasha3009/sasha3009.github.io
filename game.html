<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Circle Tap — Combo & Difficulty</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background:#111;
    color:#fff;
    font-family: system-ui, -apple-system, Segoe UI, Arial;
  }
  #gameCanvas {
    display:block;
    width:100vw;
    height:100vh;
    touch-action:none;
  }

  .hud {
    position: fixed;
    top: 10px;
    left: 10px;
    display:flex;
    gap:12px;
    align-items:center;
    background: rgba(0,0,0,.35);
    padding: 8px 10px;
    border-radius: 8px;
    backdrop-filter: blur(4px);
  }

  .controls {
    position: fixed;
    top: 10px;
    right: 10px;
    display:flex;
    gap:8px;
    align-items:center;
    background: rgba(0,0,0,.35);
    padding: 8px 10px;
    border-radius: 8px;
    backdrop-filter: blur(4px);
  }

  select {
    appearance:none;
    background:#222;
    color:#fff;
    border:1px solid #444;
    padding:6px 10px;
    border-radius:6px;
  }
</style>
</head>
<body>

<div class="hud">
  <span><b>Score:</b> <span id="scoreText">0</span></span>
  <span id="comboText" style="margin-left:12px; color:#ffd54d; font-weight:700;"></span>
</div>

<div class="controls">
  <label for="difficulty">難易度</label>
  <select id="difficulty">
    <option value="easy">Easy</option>
    <option value="normal" selected>Normal</option>
    <option value="hard">Hard</option>
  </select>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const DPR = Math.max(1, window.devicePixelRatio || 1);

function resizeCanvas() {
  const cssW = window.innerWidth;
  const cssH = window.innerHeight;
  canvas.width = Math.floor(cssW * DPR);
  canvas.height = Math.floor(cssH * DPR);
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const LEVELS = ['easy', 'normal', 'hard'];

const BASE = {
  spawnIntervalSec: 1.5,
  comboWindowSec: 1.5,
  comboStep: 0.20,
  speedMin: 80,
  speedMax: 160,
  bombChance: 0.10,
  bonusChance: 0.12
};

function buildDifficulties(levels, base) {
  const obj = {};
  levels.forEach((key, i) => {
    obj[key] = {
      spawnIntervalSec: Math.max(0.1, base.spawnIntervalSec - 0.3 * i),
      speedMin: base.speedMin,
      speedMax: base.speedMax,
      bombChance: base.bombChance,
      bonusChance: base.bonusChance,
      comboWindowSec: Math.max(0.1, base.comboWindowSec - 0.1 * i),
      comboStep: base.comboStep
    };
  });
  return obj;
}
const DIFFICULTIES = buildDifficulties(LEVELS, BASE);

let currentDifficultyKey = 'normal';
let settings = { ...DIFFICULTIES[currentDifficultyKey] };

document.getElementById('difficulty').addEventListener('change', (e) => {
  currentDifficultyKey = e.target.value;
  settings = { ...DIFFICULTIES[currentDifficultyKey] };
});

let score = 0;
let circles = [];
let lastTime = performance.now();
let spawnTimerSec = 0;

let comboCount = 0;
let lastHitAt = 0;

const scoreText = document.getElementById('scoreText');
const comboText = document.getElementById('comboText');

function getRandomColor() {
  const colors = ['red', 'blue', 'green', 'yellow', 'purple', 'orange'];
  return colors[(Math.random() * colors.length) | 0];
}

function toCanvasCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return { x: clientX - rect.left, y: clientY - rect.top };
}

function hitCircle(x, y, c) {
  return Math.hypot(x - c.x, y - c.y) < c.radius;
}

function spawnCircle() {
  const r = Math.random();
  let type = 'normal';
  let color = getRandomColor();
  let points = 10;

  if (r < settings.bombChance) {
    type = 'bomb';
    color = 'black';
    points = -50;
  } else if (r < settings.bombChance + settings.bonusChance) {
    type = 'bonus';
    color = 'gold';
    points = 50;
  }

  circles.push({
    x: Math.random() * window.innerWidth,
    y: window.innerHeight + 50,
    radius: 20 + Math.random() * 30,
    color,
    speed: settings.speedMin + Math.random() * (settings.speedMax - settings.speedMin),
    points,
    type
  });
}

function applyComboAndScore(basePoints, nowMs, type) {
  if (type === 'bomb') {
    comboCount = 0;
    lastHitAt = 0;
    comboText.textContent = '';
    return basePoints;
  }

  if (lastHitAt && (nowMs - lastHitAt) <= settings.comboWindowSec * 1000) {
    comboCount += 1;
  } else {
    comboCount = 1;
  }

  lastHitAt = nowMs;
  const multiplier = 1 + settings.comboStep * Math.max(0, comboCount - 1);
  const gained = Math.round(basePoints * multiplier);

  if (comboCount >= 2 && basePoints > 0) {
    comboText.textContent = `Combo x${comboCount}`;
  } else {
    comboText.textContent = '';
  }

  return gained;
}

function handlePoint(cx, cy){
  const {x,y} = toCanvasCoords(cx, cy);
  const now = performance.now();

  for(let i=circles.length-1;i>=0;i--){
    if(hitCircle(x,y,circles[i])){
      const add = applyComboAndScore(circles[i].points, now, circles[i].type);
      score += add;
      scoreText.textContent = score;
      circles.splice(i,1);
      return;
    }
  }
}

canvas.addEventListener('mousedown', e=>handlePoint(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  handlePoint(t.clientX, t.clientY);
}, {passive:false});

function gameLoop(now){
  const dt = Math.min(0.033,(now-lastTime)/1000);
  lastTime = now;

  spawnTimerSec += dt;
  if(spawnTimerSec >= settings.spawnIntervalSec){
    spawnCircle();
    spawnTimerSec = 0;
  }

  for(let c of circles){
    c.y -= c.speed * dt;
  }

  circles = circles.filter(c => c.y + c.radius >= 0);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let c of circles){
    ctx.fillStyle = c.color;
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.radius,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = 'white';
    ctx.font='16px Arial';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(c.points, c.x, c.y);
  }

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame((t)=>{
  lastTime = t;
  gameLoop(t);
});
</script>
</body>
</html>
